name: Forex Bot Daily Report

# چه زمانی این کد اجرا بشه
on:
  schedule:
    # فرمت زمان‌بندی: دقیقه ساعت روز ماه روزهفته
    # این خط یعنی: هر روز ساعت 05:30 به وقت UTC
    # (که تقریباً ساعت 9:00 صبح به وقت ایران هست، چون ایران 3:30 جلوتره)
    - cron: '30 5 * * *'
  # این خط باعث می‌شه بشه دستی هم از صفحه گیت‌هاب اجراش کنیم (برای تست)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # قدم ۱: کد پروژه رو از Repository میاره روی سرور موقت گیت‌هاب
      - name: Checkout repository
        uses: actions/checkout@v4

      # قدم ۲: پایتون رو روی همون سرور موقت نصب می‌کنه
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # قدم ۳: کتابخانه‌های مورد نیاز رو از requirements.txt نصب می‌کنه
      - name: Install dependencies
        run: pip install -r requirements.txt

      # قدم ۴: اسکریپت اصلی رو اجرا می‌کنه
      # رمزها از GitHub Secrets میان (که بعداً تنظیمشون می‌کنیم)
      - name: Run forex bot
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECEIVER_EMAIL: ${{ secrets.GMAIL_RECEIVER_EMAIL }}
        run: python main.py

      # قدم ۵: تغییرات price_history.json و config.json رو دوباره
      # داخل خود Repository ذخیره می‌کنه (چون هر بار سرور موقت پاک می‌شه)
      - name: Commit updated history back to repo
        run: |
          git config --global user.name "forex-bot"
          git config --global user.email "forex-bot@users.noreply.github.com"
          git add price_history.json config.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update price history"
          git push
